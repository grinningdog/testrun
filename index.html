<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://grinningdog.github.io/testrun/">
    <meta property="og:title" content="Robert Chester | Official Author Website">
    <meta property="og:description" content="Explore the Inspector Griffin Thriller Series by Robert Chester.">
    <meta property="og:image" content="https://grinningdog.github.io/testrun/Blood Relatives.jpg">

    <style>
        :root {
            --bg-color: #0a0a0c;       
            --panel-bg: #111114;       
            --accent-color: #FF003C;   
            --text-main: #FFFFFF;      
            --text-muted: #a0a0ab;     
            --border-color: #222226;   
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle, transparent 30%, rgba(10, 10, 12, 0.2) 65%, rgba(10, 10, 12, 0.75) 100%),
                url('bg.jpg');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- FIXED HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            border-bottom: 1px solid var(--border-color);
            /* Frosted glass fix */
            background: rgba(10, 10, 12, 0.8) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; border-left: 3px solid var(--accent-color); padding-left: 12px; }

        nav a { color: var(--text-main); text-decoration: none; margin-left: 2rem; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
        nav a:hover { color: var(--accent-color); }

        .hero { text-align: center; padding: 3.5rem 2.5rem; max-width: 850px; margin: 5rem auto; background: rgba(10, 10, 12, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 0, 60, 0.15); border-radius: 12px; }
        .hero h1 { font-size: 2rem; margin-bottom: 1.5rem; text-transform: uppercase; font-weight: 900; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
        .book-card { display: grid; grid-template-columns: 250px 1fr; gap: 3rem; background: rgba(10, 10, 12, 0.5); border: 1px solid rgba(255, 0, 60, 0.15); border-radius: 12px; padding: 2.5rem; margin-bottom: 2rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 7, 0.9); z-index: 1000; }
        .modal-content { background: var(--panel-bg); border: 1px solid var(--accent-color); padding: 3rem; margin: 10% auto; max-width: 500px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Robert Chester</div>
        <nav>
            <a href="#">Home</a>
            <a href="#books">Books</a>
            <a id="admin-nav-link" onclick="handleAdminNavClick()">Admin Panel</a>
        </nav>
    </header>

    <section class="hero">
        <h1>The Inspector Griffin Mysteries</h1>
        <p>When Adam Griffin and Finn Williams meet, the world changes.</p>
    </section>

    <main class="container" id="books">
        <div id="books-container"></div>
    </main>

    <script src="app.js?v=3.1"></script>
</body>
</html>
