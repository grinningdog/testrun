<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: sans-serif; padding: 2rem; }
        .card { background: #1a1a1a; padding: 2rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #333; }
        .hidden { border-left: 5px solid #FF003C; }
    </style>
</head>
<body>
    <div id="display"></div>

    <script src="database.js?v=999"></script>
    <script>
        function render() {
            // Check the URL for "?admin=true"
            const urlParams = new URLSearchParams(window.location.search);
            const isAdmin = urlParams.has('admin');
            const display = document.getElementById('display');
            display.innerHTML = '<h1>Robert Chester</h1>';

            // Render Books
            HARDCODED_BACKUP_DATA.booksData.forEach(b => {
                if (!b.hidden || isAdmin) {
                    display.innerHTML += `<div class="card ${b.hidden ? 'hidden' : ''}"><h3>${b.title}</h3><p>${b.synopsis}</p></div>`;
                }
            });

            // Render Characters
            HARDCODED_BACKUP_DATA.charactersData.forEach(c => {
                if (!c.hidden || isAdmin) {
                    display.innerHTML += `<div class="card ${c.hidden ? 'hidden' : ''}"><h3>${c.name}</h3><p>${c.bio}</p></div>`;
                }
            });
        }
        window.onload = render;
    </script>
</body>
</html>
