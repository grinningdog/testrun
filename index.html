<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robert Chester</title>
    <style>
        body { background-color: #0a0a0c; color: #fff; font-family: sans-serif; padding: 2rem; }
        .card { background: #1a1a1a; padding: 2rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>Robert Chester</h1>
    <div id="display"></div>

    <script src="database.js"></script>
    <script>
        function render() {
            const data = HARDCODED_BACKUP_DATA;
            let html = "<h2>Books</h2>";
            data.booksData.forEach(b => {
                html += `<div class="card"><h3>${b.title}</h3><p>${b.synopsis}</p></div>`;
            });

            html += "<h2>Characters</h2>";
            data.charactersData.forEach(c => {
                html += `<div class="card"><h3>${c.name}</h3><p>${c.bio}</p></div>`;
            });
            document.getElementById('display').innerHTML = html;
        }
        window.onload = render;
    </script>
</body>
</html>
