<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    <style>
        :root { --bg-color: #0a0a0c; --accent-color: #FF003C; --text-main: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            background-image: url('bg.jpg'); /* Ensure bg.jpg is in the same folder */
            background-size: cover; 
            color: var(--text-main); 
            min-height: 100vh; 
        }

        /* Header CSS */
        header { 
            display: flex !important; 
            justify-content: space-between; 
            align-items: center; 
            padding: 2rem 5%; 
            background: rgba(10, 10, 12, 0.95); 
            border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; color: white; border-left: 3px solid var(--accent-color); padding-left: 12px; }
        nav a { color: white; margin-left: 2rem; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; text-decoration: none; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .books-grid { display: flex; flex-direction: column; gap: 2rem; }
        .book-card { display: grid; grid-template-columns: 250px 1fr; gap: 2rem; background: #111114; padding: 2rem; border-radius: 12px; border: 1px solid #222; }
        
        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Robert Chester</div>
        <nav>
            <a href="index.html">Home</a>
            <a id="admin-nav-link" onclick="handleAdminNavClick()">Admin Panel</a>
        </nav>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 1rem;">Books</h2>
        <div id="books-container" class="books-grid"></div>
        
        <h2 style="margin-top: 4rem; margin-bottom: 1rem;">Dossiers</h2>
        <div id="dossiers-container" class="books-grid"></div>
    </main>

    <div id="login-modal" class="modal">
        <div style="background:#111; padding:2rem; width:90%; max-width:400px; border:1px solid #FF003C;">
            <h2 style="color:white; margin-bottom:1rem;">Admin Access</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" style="width:100%; padding:10px; background:#FF003C; color:white; border:none;">Login</button>
            </form>
        </div>
    </div>
    <script src="app.js?v=4.1"></script>
</body>
</html>
