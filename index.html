<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    <style>
        :root { --bg-color: #0a0a0c; --accent-color: #FF003C; --text-main: #FFFFFF; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .book-card { background: #111; border: 1px solid #333; padding: 2rem; margin-bottom: 2rem; border-radius: 8px; }
        .btn { background: #FFF; color: #000; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; border: none; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 2rem; color: #fff; }
    </style>
</head>
<body>
    <header class="container">
        <h1>Robert Chester</h1>
        <nav><button onclick="handleAdminNavClick()" class="btn">Admin</button></nav>
    </header>

    <main class="container" id="books">
        <div id="books-container"></div>
    </main>

    <div id="login-modal" class="modal"><div class="modal-content"><form onsubmit="handleLogin(event)"><input type="text" id="username" placeholder="User"><input type="password" id="password" placeholder="Pass"><button type="submit">Login</button></form></div></div>

    <script src="database.js?v=5.4"></script>
    <script>
        const SITE_VERSION = "5.4";
        
        function getBooks() {
            try {
                const saved = localStorage.getItem('author_books');
                return saved ? JSON.parse(saved) : HARDCODED_BACKUP_DATA.booksData;
            } catch (e) { return HARDCODED_BACKUP_DATA.booksData; }
        }

        function renderBooks() {
            const container = document.getElementById('books-container');
            container.innerHTML = '';
            getBooks().forEach(b => {
                const div = document.createElement('div');
                div.className = 'book-card';
                div.innerHTML = `<h3>${b.title}</h3><p>${b.synopsis}</p>`;
                container.appendChild(div);
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const p = document.getElementById('password').value;
            const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
            const hash = Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
            if (document.getElementById('username').value === 'admin' && hash === 'ef92b778bafe771e89245b89ecbc08a44a4e166c06659911881f383d4473e94f') {
                document.getElementById('login-modal').style.display = 'none';
                alert("Logged in!");
            } else { alert("Access Denied."); }
        }

        function handleAdminNavClick() { document.getElementById('login-modal').style.display = 'flex'; }
        window.onload = renderBooks;
    </script>
</body>
</html>
