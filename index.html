<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    
    <style>
        :root {
            --bg-color: #0a0a0c; --panel-bg: #111114; --accent-color: #FF003C;
            --text-main: #FFFFFF; --text-muted: #a0a0ab; --border-color: #222226;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, transparent 30%, rgba(10, 10, 12, 0.2) 65%, rgba(10, 10, 12, 0.75) 100%), url('bg.jpg');
            background-size: cover; background-position: center bottom; background-attachment: fixed;
            color: var(--text-main); min-height: 100vh;
        }

        header {
            display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%;
            border-bottom: 1px solid var(--border-color); background: rgba(10, 10, 12, 0.8) !important;
            backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; border-left: 3px solid var(--accent-color); padding-left: 12px; }
        nav a { color: var(--text-main); text-decoration: none; margin-left: 2rem; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
        .books-grid { display: flex; flex-direction: column; gap: 3.5rem; margin-top: 2rem; }
        .book-card, .character-card { display: grid; grid-template-columns: 250px 1fr; gap: 3rem; background: rgba(10, 10, 12, 0.5); border: 1px solid rgba(255, 0, 60, 0.15); border-radius: 12px; padding: 2.5rem; }

        /* Unified Footer Pill */
        .site-footer {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            background: #ffffff; color: #000000; padding: 0.8rem 2rem;
            margin: 4rem auto 2rem auto; max-width: 650px; border-radius: 50px;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
            white-space: nowrap;
        }
        .footer-red-line { width: 30px; height: 2px; background: var(--accent-color); flex-shrink: 0; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 7, 0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel-bg); border: 1px solid var(--accent-color); padding: 3rem; max-width: 500px; width: 90%; }
        .btn-block { width: 100%; padding: 1rem; background: #FF003C; color: #fff; font-weight: 800; border-radius: 50px; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Robert Chester</div>
        <nav>
            <a href="#">Home</a><a href="#books">Books</a><a id="admin-nav-link" onclick="handleAdminNavClick()">Admin Panel</a>
        </nav>
    </header>

    <main class="container">
        <div id="books-container" class="books-grid"></div>
        <div id="dossiers-container" class="books-grid"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-red-line"></div>
        <span>&copy; <span id="year"></span> Robert Chester. All Rights Reserved.</span>
        <div class="footer-red-line"></div>
    </footer>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal('login-modal')" style="cursor:pointer; float:right; color:white;">&times;</span>
            <h2 style="color:white; margin-bottom:1rem;">Admin Access</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" class="btn-block">Login</button>
            </form>
        </div>
    </div>

    <script src="app.js?v=3.6"></script>
</body>
</html>
