<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robert Chester | Official Website</title>
</head>
<body>
    <div id="display-area"></div>

    <script src="database.js?v=999"></script>
    <script>
        function loadData() {
            let html = "<h1>My Books</h1>";
            
            // Loop for Books
            HARDCODED_BACKUP_DATA.booksData.forEach(book => {
                html += `<h2>${book.title}</h2><p>${book.synopsis}</p>`;
            });

            html += "<hr><h1>Characters</h1>";

            // Loop for Characters
            HARDCODED_BACKUP_DATA.charactersData.forEach(char => {
                html += `<h3>${char.name}</h3><p>${char.bio}</p>`;
            });

            document.getElementById('display-area').innerHTML = html;
        }
        window.onload = loadData;
    </script>
</body>
</html>
