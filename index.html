<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0a0a0c; --panel-bg: #111114; --accent-color: #FF003C; --text-main: #FFFFFF; --text-muted: #a0a0ab; --border-color: #222226; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; padding-bottom: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; border-bottom: 1px solid var(--border-color); background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; border-left: 3px solid var(--accent-color); padding-left: 12px; }
        nav a { color: var(--text-main); text-decoration: none; margin-left: 2rem; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; margin-bottom: 6rem; }
        .book-card, .character-card { background: rgba(10, 10, 12, 0.5); border: 1px solid rgba(255, 0, 60, 0.12); border-radius: 12px; padding: 2.5rem; }
        .btn-admin-panel { background: #FFFFFF !important; color: #000000 !important; border: 1px solid #FFFFFF !important; padding: 0.55rem 1.6rem !important; font-weight: 800 !important; text-transform: uppercase !important; border-radius: 50px !important; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 7, 0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--panel-bg); border: 1px solid var(--accent-color); padding: 3rem; border-radius: 4px; width: 100%; max-width: 500px; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, textarea { background: rgba(5, 5, 7, 0.45); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 0.8rem; border-radius: 8px; }
        footer { text-align: center; padding: 0.65rem 2.2rem; color: #000 !important; background: #FFF !important; border-radius: 50px; font-weight: 800; max-width: max-content; margin: 4rem auto; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Robert Chester</div>
        <nav><a href="#books">Books</a><a href="#dossiers">Dossiers</a><a id="admin-nav-link" onclick="handleAdminNavClick()">Admin</a></nav>
    </header>

    <main class="container" id="books">
        <div id="add-book-btn-container" style="display:none; margin-bottom:2rem;"><button onclick="openBookModal()" class="btn-admin-panel">Add Book</button></div>
        <div class="books-grid" id="books-container"></div>
    </main>

    <section class="container" id="dossiers"><div class="dossier-grid" id="dossiers-container"></div></section>

    <footer>&copy; <span id="copyright-year"></span> Robert Chester</footer>

    <div id="login-modal" class="modal"><div class="modal-content"><form onsubmit="handleLogin(event)"><input type="text" id="username" placeholder="User"><input type="password" id="password" placeholder="Pass"><button type="submit">Login</button></form></div></div>

    <script src="database.js?v=5.2"></script>
    <script>
        const SITE_VERSION = "5.2";
        let isLoggedIn = false;

        function getBooks() {
            try {
                if (localStorage.getItem('site_version') !== SITE_VERSION) {
                    localStorage.setItem('site_version', SITE_VERSION);
                    localStorage.setItem('author_books', JSON.stringify(HARDCODED_BACKUP_DATA.booksData));
                    localStorage.setItem('author_characters', JSON.stringify(HARDCODED_BACKUP_DATA.charactersData));
                }
                return JSON.parse(localStorage.getItem('author_books'));
            } catch (e) { return HARDCODED_BACKUP_DATA.booksData; }
        }

        function renderBooks() {
            const books = getBooks();
            const container = document.getElementById('books-container');
            container.innerHTML = '';
            books.forEach(b => {
                const c = document.createElement('div');
                c.className = 'book-card';
                c.innerHTML = `<h3>${b.title}</h3><p>${b.synopsis}</p>`;
                container.appendChild(c);
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const p = document.getElementById('password').value;
            const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
            const hash = Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
            if (document.getElementById('username').value === 'admin' && hash === 'ef92b778bafe771e89245b89ecbc08a44a4e166c06659911881f383d4473e94f') {
                isLoggedIn = true;
                document.getElementById('add-book-btn-container').style.display = 'block';
                document.getElementById('login-modal').style.display = 'none';
                renderBooks();
            } else { alert("Access Denied."); }
        }

        function handleAdminNavClick() { document.getElementById('login-modal').style.display = 'flex'; }
        window.onload = () => { document.getElementById('copyright-year').innerText = new Date().getFullYear(); renderBooks(); };
    </script>
</body>
</html>
