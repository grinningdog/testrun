<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robert Chester | Official Website</title>
</head>
<body>
    <div id="display-area"></div>

    <script src="database.js?v=999"></script>
    <script>
        function loadData() {
            // This force-loads the data from database.js directly
            const data = HARDCODED_BACKUP_DATA.booksData;
            let html = "<h1>My Books</h1>";
            data.forEach(book => {
                html += `<h2>${book.title}</h2><p>${book.synopsis}</p>`;
            });
            document.getElementById('display-area').innerHTML = html;
        }
        window.onload = loadData;
    </script>
</body>
</html>
