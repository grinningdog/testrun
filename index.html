<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Official Website</title>
    <style>
        :root { --bg-color: #0a0a0c; --accent-color: #FF003C; --text-main: #FFFFFF; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 40px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .book-card, .character-card { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 12px; padding: 2.5rem; margin-bottom: 2rem; }
        .section-title { font-size: 2rem; text-transform: uppercase; border-left: 4px solid var(--accent-color); padding-left: 14px; margin-bottom: 2rem; }
        .hidden-badge { background: var(--accent-color); color: #fff; padding: 2px 8px; font-size: 0.7rem; border-radius: 4px; margin-left: 10px; }
        .btn-login { background: #fff; color: #000; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; border: none; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 2rem; border: 1px solid var(--accent-color); }
    </style>
</head>
<body>
    <header class="container">
        <h1>Robert Chester</h1>
        <button class="btn-login" onclick="document.getElementById('login-modal').style.display='flex'">Admin</button>
    </header>

    <main class="container">
        <h2 class="section-title">The Inspector Griffin Series</h2>
        <div id="books-container"></div>
        <h2 class="section-title">Character Dossiers</h2>
        <div id="dossiers-container"></div>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="User">
                <input type="password" id="password" placeholder="Pass">
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <script src="database.js?v=5.5"></script>
    <script>
        let isLoggedIn = false;

        function render() {
            const bc = document.getElementById('books-container');
            const dc = document.getElementById('dossiers-container');
            bc.innerHTML = ''; dc.innerHTML = '';

            HARDCODED_BACKUP_DATA.booksData.forEach(b => {
                if (!b.hidden || isLoggedIn) {
                    bc.innerHTML += `<div class="book-card"><h3>${b.title} ${b.hidden ? '<span class="hidden-badge">HIDDEN</span>' : ''}</h3><p>${b.synopsis}</p></div>`;
                }
            });

            HARDCODED_BACKUP_DATA.charactersData.forEach(c => {
                if (!c.hidden || isLoggedIn) {
                    dc.innerHTML += `<div class="character-card"><h3>${c.name} ${c.hidden ? '<span class="hidden-badge">HIDDEN</span>' : ''}</h3><p>${c.bio}</p></div>`;
                }
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const p = document.getElementById('password').value;
            const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
            const hash = Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
            if (document.getElementById('username').value === 'admin' && hash === 'ef92b778bafe771e89245b89ecbc08a44a4e166c06659911881f383d4473e94f') {
                isLoggedIn = true;
                document.getElementById('login-modal').style.display = 'none';
                render();
            } else { alert("Access Denied."); }
        }

        window.onload = render;
    </script>
</body>
</html>
