 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Chester | Author</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Robert Chester</h1>
    </header>

    <section id="books-container" class="grid"></section>

    <section id="contact">
        <h2>Get in Touch</h2>
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="YOUR_CONTACT_KEY">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; <span id="year"></span> Robert Chester. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
